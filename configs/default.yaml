training:
  epochs: 50
  batch_size: 8
  learning_rate: 0.0001
  physics_weight: 0.1
  kl_weight: 0.0001
  weight_decay: 0.01
  val_session_fraction: 0.2
  seed: 42
  num_workers: 0

model:
  flow_hidden: 128
  depth_hidden: 64
  imu_hidden: 64
  imu_sequence_length: 200
  fusion_hidden: 256
  fusion_layers: 3
  dropout: 0.2
  use_flipout: true
  prior_std: 1.0
  posterior_std_init: 0.1
